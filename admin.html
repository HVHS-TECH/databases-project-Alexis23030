<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alexis' Games</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- firebase start ****************************************-->
    <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
    <!-- firebase end ******************************************-->
    <script src="fb_setup.js"></script>
</head>

<body>
    <div id="mainLayout">
        <div id="leftColumn">
            <h2>Select a user:</h2>
            <select id="userDropdown"></select>
            <div id="adminContent"></div>
            <button onclick="fb_adminEdit()" id="editButton" class="button" type="button">Edit</button>
            <div id="adminButtonContainer">
                <button onclick="fb_adminRead();" id="cancelButton" class="button" type="button">Cancel</button>
                <button onclick="fb_adminWrite()" id="saveButton" class="button" type="button">Save</button>
            </div>
        </div>
        <div id="topBar">
            <a href="index.html" id="adminButton" class="button">Home</a>
            <div id="profilePic"></div>
        </div>

    </div>
    <script src="fb_io.js"></script>
</body>

</html>
